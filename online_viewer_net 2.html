<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque Culinaire</title>

<style>
:root{
    --bg:#1C1714;
    --card:#251E19;
    --text:#E8DFD4;
    --gold:#C9A962;
    --border:#4A3F35;
}

body{
    margin:0;
    font-family: Georgia, serif;
    background:var(--bg);
    color:var(--text);
    padding:20px;
}

h1{
    text-align:center;
    color:var(--gold);
}

.switch{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

button{
    padding:12px;
    border:none;
    background:var(--gold);
    color:#1C1714;
    font-weight:bold;
    cursor:pointer;
    width:100%;
}

.modeBtn{
    width:48%;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}

input, select{
    width:100%;
    padding:10px;
    margin:6px 0;
}

.item{
    border-bottom:1px solid var(--border);
    padding:10px 0;
}

img{
    width:100%;
    max-height:160px;
    object-fit:cover;
    border-radius:8px;
    margin-bottom:8px;
}

.badge{
    padding:4px 8px;
    border-radius:10px;
    font-size:12px;
}

.warning{background:orange;}
.expired{background:red;}

.hidden{display:none;}
</style>
</head>

<body>

<h1>📚 Bibliothèque Culinaire</h1>

<div class="switch">
<button onclick="setMode('simple')" class="modeBtn">SIMPLE</button>
<button onclick="setMode('premium')" class="modeBtn">PREMIUM</button>
</div>

<div id="simpleMode">

<div class="card">
<h3>Ajouter aliment</h3>

<input id="s_name" placeholder="Nom">
<input id="s_date" type="date">

<button onclick="addSimple()">Ajouter</button>
</div>

<div class="card">
<h3>Inventaire</h3>
<div id="s_list"></div>
</div>

<div class="card">
<h3>Recette IA</h3>
<button onclick="recipeSimple()">Générer</button>
<p id="s_recipe"></p>
</div>

</div>

<div id="premiumMode" class="hidden">

<div class="card">
<h3>Ajouter aliment (Premium)</h3>

<input id="p_name" placeholder="Nom">
<input id="p_date" type="date">

<input id="p_img" placeholder="Image URL (optionnel)">
<input id="p_file" type="file" accept="image/*">

<select id="p_cat">
<option>Frigo</option>
<option>Congélateur</option>
<option>Placard</option>
</select>

<button onclick="addPremium()">Ajouter</button>
</div>

<div class="card">
<h3>Inventaire Premium</h3>
<div id="p_list"></div>
</div>

<div class="card">
<h3>Recettes IA avancées</h3>
<button onclick="recipePremium()">Créer recette</button>
<p id="p_recipe"></p>
</div>

</div>

<script>

let foods = JSON.parse(localStorage.getItem("foods")||"[]");

function save(){
localStorage.setItem("foods", JSON.stringify(foods));
}

function setMode(mode){
document.getElementById("simpleMode").classList.toggle("hidden", mode!=="simple");
document.getElementById("premiumMode").classList.toggle("hidden", mode!=="premium");
}

/* -------- SIMPLE -------- */

function addSimple(){
const name=document.getElementById("s_name").value;
const date=document.getElementById("s_date").value;
if(!name||!date)return;

foods.push({name,date});
save();
render();
}

function recipeSimple(){
const n=foods.map(f=>f.name.toLowerCase());
let r="Ajoute des ingrédients.";

if(n.includes("tomate")&&n.includes("pâtes"))r="🍝 Pâtes à la tomate";
if(n.includes("riz")&&n.includes("poulet"))r="🍛 Riz au poulet";

document.getElementById("s_recipe").textContent=r;
}

/* -------- PREMIUM -------- */

async function addPremium(){

const name=document.getElementById("p_name").value;
const date=document.getElementById("p_date").value;
const imgUrl=document.getElementById("p_img").value;
const file=document.getElementById("p_file").files[0];
const cat=document.getElementById("p_cat").value;

if(!name||!date)return;

let img="";

if(file){
img=await new Promise(res=>{
const r=new FileReader();
r.onload=e=>res(e.target.result);
r.readAsDataURL(file);
});
}else{
img=imgUrl;
}

foods.push({name,date,img,cat});
save();
render();
}

function recipePremium(){
const n=foods.map(f=>f.name.toLowerCase());
let r="Ajoute plus d'ingrédients.";

if(n.includes("poulet")&&n.includes("riz"))r="🍛 Bowl premium poulet-riz";
if(n.includes("saumon"))r="🐟 Saumon rôti au four";

document.getElementById("p_recipe").textContent=r;
}

/* -------- RENDER -------- */

function render(){

let s=document.getElementById("s_list");
let p=document.getElementById("p_list");

s.innerHTML="";
p.innerHTML="";

foods.forEach(f=>{

let d=document.createElement("div");
d.className="item";

let diff=Math.ceil((new Date(f.date)-new Date())/86400000);

let badge="";

if(diff<=0)badge='<span class="badge expired">Périmé</span>';
else if(diff<=3)badge='<span class="badge warning">Urgent</span>';

d.innerHTML=
`<strong>${f.name}</strong><br>
${f.date}<br>
${badge}`;

s.appendChild(d);

/* premium */

let dp=document.createElement("div");
dp.className="item";

dp.innerHTML=
(f.img?`<img src="${f.img}">`:"")+
`<strong>${f.name}</strong> (${f.cat||"?"})<br>
${f.date}<br>
${badge}`;

p.appendChild(dp);

});

}

render();

</script>

</body>
</html>
